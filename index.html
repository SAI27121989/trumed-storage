<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Direct Access Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 60px; border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; cursor: pointer; }
        .occupied { background-color: #f0f7ff; border: 1.5px solid #3b82f6; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
        .selected { outline: 3px solid #f59e0b; background-color: #fffbeb; z-index: 10; transform: translateY(-2px); }
        .modal { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 24px; border-radius: 20px; z-index: 50; display: none; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body onload="initApp()">

    <div id="info-modal" class="modal">
        <h3 id="modal-title" class="text-blue-400 font-black text-xl mb-4 uppercase italic">System Log</h3>
        <div id="modal-body" class="text-sm font-medium leading-relaxed"></div>
        <button onclick="closeModal()" class="mt-8 w-full bg-slate-800 py-3 rounded-xl font-bold hover:bg-slate-700 transition-colors">Dismiss</button>
    </div>

    <header class="bg-white px-10 py-5 shadow-sm border-b flex flex-col lg:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-blue-900 font-black text-2xl tracking-tight">TruMed Path Labs India Pvt Ltd</h1>
            <div class="flex gap-3 mt-1">
                <span class="text-[9px] bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-full font-bold uppercase">7-Day Check Active</span>
                <span id="stat-counter" class="text-[9px] bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full font-bold uppercase">0/100 Occupied</span>
            </div>
        </div>
        <div class="flex gap-2 w-full max-w-md">
            <input type="text" id="global-search" placeholder="Quick Search (7 Days)..." class="flex-1 p-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none focus:border-blue-400">
            <button onclick="deepSearch()" class="bg-slate-900 text-white px-6 py-2 rounded-2xl text-xs font-black shadow-md hover:bg-black transition-all">SEARCH</button>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                <div class="text-[11px] font-black text-blue-600 uppercase mb-3 tracking-widest" id="display-slot">Position: Slot 1</div>
                <input type="text" id="barcode-input" placeholder="SCAN BARCODE" class="w-full p-5 border-2 border-slate-50 rounded-2xl font-black text-3xl text-center uppercase focus:border-blue-500 focus:bg-white outline-none mb-5 bg-slate-50 transition-all">
                
                <div class="space-y-3">
                    <button id="save-btn" onclick="validateAndSave()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase shadow-xl hover:bg-blue-700 transition-all">Save & Next</button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="deleteSingleSlot()" class="bg-slate-50 text-slate-400 font-bold py-3 rounded-xl text-[10px] uppercase hover:bg-red-50 hover:text-red-500 transition-colors">Clear Slot</button>
                        <button onclick="showAudit()" class="bg-slate-50 text-slate-500 font-bold py-3 rounded-xl text-[10px] uppercase hover:bg-slate-100 transition-colors">Audit Info</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm space-y-4">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Archive View</label>
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-4 border border-slate-100 rounded-2xl font-bold bg-slate-50 text-sm outline-none focus:border-blue-300">
                <select id="rack-select" onchange="loadData()" class="w-full p-4 border border-slate-100 rounded-2xl font-bold bg-slate-50 text-sm outline-none focus:border-blue-300"></select>
                
                <div class="pt-6 border-t border-slate-50">
                    <button onclick="exportFullDay()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black text-[11px] uppercase shadow-lg hover:bg-emerald-700 transition-all">Export Daily Backup</button>
                    <p class="text-[9px] text-slate-400 text-center mt-3 font-medium">Includes Rack ID & Slot ID</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm">
            <div id="grid" class="grid grid-cols-5 md:grid-cols-10 gap-4"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1;
        let activeData = {};

        // Runs automatically on page load
        function initApp() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid();
            loadData();
            runAutoCleanup();
        }

        async function runAutoCleanup() {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 8); 
            const cutoffStr = cutoff.toISOString().split('T')[0];
            const snapshot = await db.ref('samples').once('value');
            const allDays = snapshot.val();
            for (let date in allDays) {
                if (date < cutoffStr) await db.ref(`samples/${date}`).remove();
            }
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1.5 left-2 text-[9px] font-black text-slate-200">${i}</span>
                    <span id="txt-${i}" class="text-[11px] font-black text-slate-800 px-1 text-center truncate"></span>
                </div>`;
            }
        }

        async function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "FAST CHECK...";

            let dupFound = false;
            let dupMsg = "";

            for (let i = 0; i < 7; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const snapshot = await db.ref(`samples/${ds}`).once('value');
                const dayData = snapshot.val();
                if(dayData) {
                    for(let r in dayData) {
                        for(let sl in dayData[r]) {
                            const val = dayData[r][sl]?.code || dayData[r][sl];
                            if(val === code) {
                                dupFound = true; dupMsg = `Duplicate found on ${ds}\nRack: ${r}, Slot: ${sl.replace('slot-','')}`;
                                break;
                            }
                        }
                        if(dupFound) break;
                    }
                }
                if(dupFound) break;
            }

            if(dupFound) {
                alert("🛑 DUPLICATE BLOCKED\n" + dupMsg);
                document.getElementById('barcode-input').value = '';
            } else {
                const date = document.getElementById('current-date').value;
                const rack = document.getElementById('rack-select').value;
                const entry = { code: code, time: new Date().toLocaleString() };
                await db.ref(`samples/${date}/${rack}/slot-${currentSlot}`).set(entry);
                document.getElementById('barcode-input').value = '';
                if(currentSlot < 100) setSlot(currentSlot + 1);
            }
            btn.disabled = false; btn.innerText = "Save & Next";
        }

        function loadData() {
            const d = document.getElementById('current-date').value;
            const r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                let count = 0;
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    const data = activeData[`slot-${i}`];
                    const code = data?.code || (typeof data === 'string' ? data : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    if(code) { el.classList.add('occupied'); count++; } 
                    else { el.classList.remove('occupied'); }
                }
                document.getElementById('stat-counter').innerText = `${count}/100 Occupied`;
            });
        }

        function showAudit() {
            const data = activeData[`slot-${currentSlot}`];
            const modal = document.getElementById('info-modal');
            document.getElementById('modal-title').innerText = `Slot ${currentSlot} Audit`;
            document.getElementById('modal-body').innerHTML = data?.time 
                ? `<div class='bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-inner'><p class='text-slate-400 uppercase text-[10px] font-bold'>Barcode</p><p class='text-white font-black text-xl mb-3'>${data.code}</p><p class='text-slate-400 uppercase text-[10px] font-bold'>Timestamp</p><p class='text-blue-300 font-bold'>${data.time}</p></div>`
                : "No data recorded for this slot.";
            modal.style.display = 'block';
        }

        async function deepSearch() {
            const term = document.getElementById('global-search').value.trim().toUpperCase();
            if(!term) return;
            const body = document.getElementById('modal-body');
            const modal = document.getElementById('info-modal');
            document.getElementById('modal-title').innerText = "Archive Result";
            body.innerHTML = "Scanning 7-day database...";
            modal.style.display = 'block';
            let found = false;
            for (let i = 0; i < 7; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            const val = day[r][sl]?.code || day[r][sl];
                            if(val === term) {
                                body.innerHTML = `<div class='bg-emerald-900/50 p-5 rounded-2xl border border-emerald-500/30'><p class='text-emerald-400 font-black text-lg mb-2'>SAMPLE LOCATED</p><p class='text-white text-xs'>DATE: <b>${ds}</b></p><p class='text-white text-xs'>RACK: <b>${r}</b></p><p class='text-white text-xs'>SLOT: <b>${sl.replace('slot-','')}</b></p></div>`;
                                found = true; break;
                            }
                        }
                        if(found) break;
                    }
                }
                if(found) break;
            }
            if(!found) body.innerHTML = "Sample not found in 7-day storage.";
        }

        async function exportFullDay() {
            const date = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${date}`).once('value');
            const data = snap.val();
            if(!data) return alert("No data recorded for this date.");
            let csv = "RACK ID,SLOT POSITION,BARCODE,SCAN TIME\n";
            for(let r in data) {
                for(let s in data[r]) {
                    const code = data[r][s]?.code || data[r][s];
                    const time = data[r][s]?.time || "N/A";
                    csv += `${r},${s.replace('slot-','')},${code},"${time}"\n`;
                }
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `TruMed_Backup_${date}.csv`; a.click();
        }

        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            document.getElementById(`slot-${i}`).classList.add('selected');
            document.getElementById('display-slot').innerText = `Position: Slot ${i}`;
            document.getElementById('barcode-input').focus();
        }

        function deleteSingleSlot() {
            if(confirm(`Permanently delete sample from Slot ${currentSlot}?`)) {
                db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove();
            }
        }

        function closeModal() { document.getElementById('info-modal').style.display = 'none'; }
        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
    </script>
</body>
</html>
