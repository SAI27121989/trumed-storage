<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Sample Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --trumed-blue: #007399; --trumed-red: #d14d4d; --bg-slate: #f1f5f9; }
        body { background-color: var(--bg-slate); font-family: 'Inter', sans-serif; margin: 0; }
        .brand-text { color: var(--trumed-blue); font-weight: 800; font-size: 1.1rem; line-height: 1.2; }
        .red-line { border-bottom: 2px solid var(--trumed-red); width: 35px; margin-top: 1px; }
        .slot { border: 1px solid #cbd5e1; transition: all 0.1s ease; background: white; position: relative; min-height: 52px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .occupied { background-color: #e0f2fe !important; border: 1px solid var(--trumed-blue) !important; }
        .selected { outline: 3px solid #f59e0b; outline-offset: 1px; z-index: 10; background-color: #fffbeb; }
        .slot-number { font-size: 8px; color: #94a3b8; position: absolute; top: 1px; left: 3px; font-weight: 700; }
        .sample-text { font-size: 9px; color: #0f172a; font-weight: 800; text-align: center; word-break: break-all; padding: 0 2px; }
        @media print { .no-print { display: none !important; } body { background: white; } .slot { border: 1px solid #000 !important; } }
    </style>
</head>
<body>
    <header class="bg-white px-4 py-2 shadow-sm no-print border-b border-slate-200">
        <div class="max-w-7xl mx-auto flex flex-row justify-between items-center">
            <div>
                <h1 class="brand-text">TruMed Path Labs India Pvt Ltd</h1>
                <div class="red-line"></div>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Live Sample Management</p>
            </div>
            <div class="relative w-40 md:w-64">
                <input type="text" id="global-search" oninput="debouncedSearch()" placeholder="Search Barcode..." 
                       class="w-full pl-8 pr-3 py-1.5 bg-slate-100 border border-slate-300 rounded text-xs font-bold outline-none focus:border-blue-500">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-3 md:p-5">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-5">
            <div class="lg:col-span-3 space-y-4 no-print">
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 shadow-sm">
                    <div class="text-[9px] font-black text-emerald-600 uppercase mb-1" id="display-slot">Slot 1</div>
                    <input type="text" id="sample-id-input" placeholder="SCAN BARCODE" 
                           class="w-full p-2 bg-white border-2 border-emerald-200 rounded-lg font-black text-xl text-center outline-none mb-3 focus:border-emerald-500 uppercase">
                    <button onclick="saveAndNext()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-3 rounded-lg uppercase transition-all active:scale-95">Save & Next</button>
                    <button onclick="deleteNow()" class="w-full mt-2 text-red-500 hover:bg-red-50 text-[9px] font-black py-1.5 rounded-md border border-red-100 uppercase transition-all">Delete Current Slot</button>
                </div>

                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-[10px]">
                    <div class="grid grid-cols-1 gap-3 mb-4">
                        <div>
                            <label class="font-bold text-slate-400 uppercase block mb-1">Date Selection</label>
                            <input type="date" id="current-date" onchange="loadData()" class="w-full p-1.5 bg-slate-50 border rounded font-bold">
                        </div>
                        <div>
                            <label class="font-bold text-slate-400 uppercase block mb-1">Rack Selection</label>
                            <select id="rack-select" onchange="loadData()" class="w-full p-1.5 bg-slate-50 border rounded font-bold"></select>
                        </div>
                    </div>
                    <button onclick="window.print()" class="w-full bg-slate-800 text-white p-2 font-black rounded uppercase hover:bg-black mb-2">🖨️ Print Rack Report</button>
                    <button onclick="clearEntireRack()" class="w-full text-red-600 border border-red-200 p-2 font-black rounded uppercase hover:bg-red-50">⚠️ Clear Entire Rack</button>
                </div>
            </div>

            <div class="lg:col-span-9 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm main-content">
                <div class="flex justify-between items-center mb-4 pb-2 border-b">
                    <h2 id="rack-title" class="text-xl font-black text-slate-800 uppercase tracking-tighter">Rack 1</h2>
                    <div class="flex items-center gap-4">
                        <span id="stat-count" class="text-lg font-black text-blue-700 bg-blue-50 px-3 py-1 rounded-lg">0 / 100</span>
                    </div>
                </div>
                <div id="grid-container" class="grid grid-cols-5 sm:grid-cols-10 gap-1.5"></div>
            </div>
        </div>
    </main>

    <script>
        // --- YOUR CONNECTED FIREBASE KEYS ---
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };
        // ------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedSlotId = 1;

        function initApp() {
            const rs = document.getElementById('rack-select');
            for(let i=1; i<=40; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; rs.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            createGrid();
            loadData();
            selectSlot(1);
        }

        function createGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = ''; 
            for (let i = 1; i <= 100; i++) {
                const d = document.createElement('div'); 
                d.id = `slot-${i}`; d.className = 'slot';
                d.innerHTML = `<span class="slot-number">${i}</span><span class="sample-text" id="text-${i}"></span>`;
                d.onclick = () => selectSlot(i); 
                container.appendChild(d);
            }
        }

        function saveAndNext() {
            const id = document.getElementById('sample-id-input').value.trim();
            const dt = document.getElementById('current-date').value;
            const rk = document.getElementById('rack-select').value;
            if(!id) return;

            db.ref(`samples/${dt}/${rk}/slot-${selectedSlotId}`).set(id);
            document.getElementById('sample-id-input').value = '';
            if(selectedSlotId < 100) selectSlot(selectedSlotId + 1);
        }

        function loadData() {
            const dt = document.getElementById('current-date').value;
            const rk = document.getElementById('rack-select').value;
            document.getElementById('rack-title').innerText = rk.replace('_', ' ');

            db.ref(`samples/${dt}/${rk}`).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    const txt = document.getElementById(`text-${i}`);
                    const val = data[`slot-${i}`];
                    if(val) {
                        el.classList.add('occupied');
                        txt.innerText = val;
                    } else {
                        el.classList.remove('occupied');
                        txt.innerText = '';
                    }
                }
                document.getElementById('stat-count').innerText = `${document.querySelectorAll('.occupied').length} / 100`;
            });
        }

        function selectSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlotId = i; 
            const el = document.getElementById(`slot-${i}`);
            if(el) {
                el.classList.add('selected');
                document.getElementById('display-slot').innerText = `Slot ${i}`;
                document.getElementById('sample-id-input').focus();
            }
        }

        function deleteNow() {
            if(!confirm("Clear this slot?")) return;
            const dt = document.getElementById('current-date').value;
            const rk = document.getElementById('rack-select').value;
            db.ref(`samples/${dt}/${rk}/slot-${selectedSlotId}`).remove();
        }

        function clearEntireRack() {
            if(!confirm("⚠️ DELETE ALL SAMPLES IN THIS RACK?")) return;
            const dt = document.getElementById('current-date').value;
            const rk = document.getElementById('rack-select').value;
            db.ref(`samples/${dt}/${rk}`).remove();
        }

        document.getElementById('sample-id-input').onkeypress = (e) => { if(e.key === 'Enter') saveAndNext(); };
        window.onload = initApp;
    </script>
</body>
</html>
