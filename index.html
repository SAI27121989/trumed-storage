<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Lab Management Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 55px; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; }
        .occupied { background-color: #eff6ff; border: 1.5px solid #3b82f6; }
        .duplicate-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; animation: shake 0.4s ease-in-out; }
        .selected { outline: 3px solid #f59e0b; z-index: 10; transform: scale(1.02); }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 100; align-items: center; justify-content: center; }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body onload="initApp()">

    <div id="search-modal" class="modal" onclick="closeModal()">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full m-4" onclick="event.stopPropagation()">
            <h2 id="modal-title" class="text-blue-900 font-black text-xl mb-4 uppercase">Archive Result</h2>
            <div id="modal-content" class="text-sm font-medium space-y-4"></div>
            <button onclick="closeModal()" class="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Close</button>
        </div>
    </div>

    <header class="bg-white px-8 py-4 shadow-sm border-b flex justify-between items-center no-print">
        <h1 class="text-blue-900 font-black text-xl tracking-tight">TruMed Path Labs India Pvt Ltd</h1>
        <div class="flex gap-4">
             <div id="sync-indicator" class="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-3 py-1 rounded-full uppercase">Instant Sync Active</div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 no-print">
        
        <div class="lg:col-span-3 space-y-4">
            
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="text-[10px] font-black text-blue-500 uppercase mb-2" id="display-slot">Active: Slot 1</div>
                <input type="text" id="barcode-input" autocomplete="off" placeholder="SCAN BARCODE" class="w-full p-4 border-2 border-slate-100 rounded-xl font-black text-2xl text-center uppercase focus:border-blue-600 outline-none mb-4 bg-slate-50">
                <button onclick="validateAndSave()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Instant Save</button>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button onclick="deleteSingleSlot()" class="bg-slate-50 text-slate-400 font-bold py-2 rounded-lg text-[10px] uppercase">Clear Slot</button>
                    <button onclick="showAudit()" class="bg-slate-50 text-slate-500 font-bold py-2 rounded-lg text-[10px] uppercase">Audit Info</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-3">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Rack Selection</label>
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm">
                <select id="rack-select" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm"></select>
                
                <hr class="my-2 border-slate-100">
                
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Find Sample (7 Days)</label>
                <div class="flex gap-1">
                    <input type="text" id="search-input" placeholder="Barcode..." class="flex-1 p-3 border rounded-xl text-xs bg-slate-50 outline-none focus:border-blue-400">
                    <button onclick="deepSearch()" class="bg-slate-800 text-white px-4 rounded-xl font-bold text-[10px]">SEARCH</button>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button onclick="window.print()" class="bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Print Report</button>
                    <button onclick="exportFullDay()" class="bg-emerald-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Excel CSV</button>
                </div>
            </div>

            <div id="alert-panel" class="hidden bg-white p-5 rounded-3xl border-2 border-red-100 shadow-sm">
                <h3 class="text-red-600 font-black text-[11px] uppercase mb-3 tracking-widest">Duplicate Alerts</h3>
                <div id="alert-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-8 rounded-3xl border shadow-sm">
            <div id="grid" class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>
        </div>
    </main>

    <div id="print-area" class="hidden p-10 bg-white">
        <h1 class="text-2xl font-black border-b-2 border-black pb-2 uppercase">TruMed Path Labs India Pvt Ltd</h1>
        <div id="print-info" class="my-4 font-bold flex gap-10 text-sm uppercase"></div>
        <table class="w-full border-collapse border border-slate-400" id="print-table"></table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1, activeData = {};

        function initApp() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid(); loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-1.5 text-[8px] font-black text-slate-300">${i}</span>
                    <span id="txt-${i}" class="text-[10px] font-black text-slate-700 truncate px-1"></span>
                </div>`;
            }
            setSlot(1);
        }

        function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            
            const date = document.getElementById('current-date').value;
            const rack = document.getElementById('rack-select').value;
            const slotToUpdate = currentSlot;

            const el = document.getElementById(`slot-${slotToUpdate}`);
            document.getElementById(`txt-${slotToUpdate}`).innerText = code;
            el.classList.add('occupied');
            el.classList.remove('duplicate-error');
            
            document.getElementById('barcode-input').value = '';
            if(currentSlot < 100) setSlot(currentSlot + 1);

            db.ref(`samples/${date}/${rack}/slot-${slotToUpdate}`).set({ 
                code: code, 
                time: new Date().toLocaleString() 
            });

            checkDuplicates(code, slotToUpdate, date, rack);
        }

        async function checkDuplicates(code, slotId, currDate, currRack) {
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            for(let i=0; i<snapshots.length; i++) {
                const dayData = snapshots[i].val();
                if(!dayData) continue;
                for(let r in dayData) {
                    for(let sl in dayData[r]) {
                        const val = dayData[r][sl]?.code || dayData[r][sl];
                        if(val === code && (r !== currRack || sl !== `slot-${slotId}`)) {
                            document.getElementById(`slot-${slotId}`).classList.add('duplicate-error');
                            addAlert(code, dates[i], r, sl.replace('slot-',''));
                            return;
                        }
                    }
                }
            }
        }

        async function deepSearch() {
            const term = document.getElementById('search-input').value.trim().toUpperCase();
            if(!term) return;
            const modal = document.getElementById('search-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';
            content.innerHTML = `<div class="p-4 bg-blue-50 text-blue-700 font-bold rounded-xl italic">Searching last 7 days...</div>`;
            
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            let found = false;
            for(let i=0; i<snapshots.length; i++) {
                const day = snapshots[i].val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            const code = day[r][sl]?.code || day[r][sl];
                            if(code === term) {
                                content.innerHTML = `
                                    <div class="bg-emerald-50 p-6 rounded-2xl border-2 border-emerald-100 text-emerald-800">
                                        <p class="text-xs uppercase font-black opacity-50">Barcode ID</p>
                                        <p class="text-2xl font-black mb-4">${code}</p>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div><p class="text-[10px] uppercase font-black opacity-50">Date</p><p class="font-bold">${dates[i]}</p></div>
                                            <div><p class="text-[10px] uppercase font-black opacity-50">Rack</p><p class="font-bold">${r}</p></div>
                                            <div><p class="text-[10px] uppercase font-black opacity-50">Slot</p><p class="font-bold">${sl.replace('slot-','')}</p></div>
                                        </div>
                                    </div>`;
                                found = true; break;
                            }
                        }
                    }
                }
                if(found) break;
            }
            if(!found) content.innerHTML = `<div class="bg-red-50 p-6 rounded-2xl border-2 border-red-100 text-red-800 font-bold">No match found in recent history.</div>`;
        }

        function addAlert(code, date, rack, slot) {
            const panel = document.getElementById('alert-panel');
            const list = document.getElementById('alert-list');
            panel.classList.remove('hidden');
            const div = document.createElement('div');
            div.className = "p-3 bg-red-50 rounded-xl text-[10px] border border-red-100";
            div.innerHTML = `<p class="font-black text-red-700">${code}</p><p class="text-slate-500">Found: ${date} | ${rack} | Slot ${slot}</p>`;
            list.prepend(div);
        }

        function loadData() {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`), val = activeData[`slot-${i}`];
                    const code = val?.code || (typeof val === 'string' ? val : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    code ? el.classList.add('occupied') : el.classList.remove('occupied');
                    el.classList.remove('duplicate-error');
                }
            });
        }

        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            const el = document.getElementById(`slot-${i}`);
            if(el) {
                el.classList.add('selected');
                document.getElementById('display-slot').innerText = `Active: Slot ${i}`;
                document.getElementById('barcode-input').focus();
            }
        }

        function showAudit() {
            const d = activeData[`slot-${currentSlot}`];
            const modal = document.getElementById('search-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';
            content.innerHTML = d ? `
                <div class="bg-slate-50 p-5 rounded-xl">
                    <p class="text-[10px] uppercase font-black opacity-40">Barcode</p>
                    <p class="text-xl font-bold mb-3">${d.code||d}</p>
                    <p class="text-[10px] uppercase font-black opacity-40">Scan Timestamp</p>
                    <p class="font-bold text-blue-600">${d.time||'N/A'}</p>
                </div>` : `<p class='italic opacity-50'>No sample in this slot.</p>`;
        }

        async function exportFullDay() {
            const date = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${date}`).once('value');
            const data = snap.val();
            let csv = "RACK,POSITION,BARCODE,TIME\n";
            for(let r in data) for(let s in data[r]) {
                const d = data[r][s];
                csv += `${r},${s.replace('slot-','')},${d.code||d},"${d.time||''}"\n`;
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `TruMed_${date}.csv`; a.click();
        }

        window.onbeforeprint = () => {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            document.getElementById('print-info').innerHTML = `<span>DATE: ${d}</span><span>RACK: ${r}</span>`;
            let h = '<tr><th class="border p-1">Slot</th><th class="border p-1">Barcode</th></tr>';
            for(let i=1; i<=100; i++) {
                const val = activeData[`slot-${i}`];
                if(val) h += `<tr><td class="border p-1 text-center">${i}</td><td class="border p-1 font-bold">${val.code||val}</td></tr>`;
            }
            document.getElementById('print-table').innerHTML = h;
        };

        function deleteSingleSlot() { if(confirm('Clear current slot?')) db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove(); }
        function closeModal() { document.getElementById('search-modal').style.display = 'none'; }
        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
    </script>
</body>
</html>
