<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Strict Duplicate Prevention</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --trumed-blue: #007399; }
        body { background-color: #f8fafc; font-family: sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 55px; border-radius: 6px; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .occupied { background-color: #f0f9ff; border: 1px solid #0ea5e9; }
        .selected { outline: 3px solid #f59e0b; background-color: #fffbeb; z-index: 10; }
        #login-overlay { position: fixed; inset: 0; background: #ffffff; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .search-modal { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 20px; border-radius: 12px; z-index: 50; display: none; width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="p-8 border rounded-2xl shadow-xl w-80 text-center bg-white">
            <h1 class="text-2xl font-black text-blue-900 mb-6">TRUMED LOGIN</h1>
            <input type="password" id="lab-pass" placeholder="Password" class="w-full p-3 border rounded-lg mb-4 text-center outline-none">
            <button onclick="checkLogin()" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold">Access System</button>
        </div>
    </div>

    <div id="search-modal" class="search-modal">
        <h3 id="modal-title" class="text-orange-400 font-bold text-lg mb-2">Notice</h3>
        <div id="found-info" class="space-y-1 text-sm"></div>
        <button onclick="closeSearch()" class="mt-4 w-full bg-slate-700 py-2 rounded font-bold">Close</button>
    </div>

    <header class="bg-white px-6 py-3 shadow-md border-b flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-blue-900 font-black text-xl">TruMed Path Labs India Pvt Ltd</h1>
            <span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold uppercase">Strict 30-Day Duplicate Block Active</span>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <input type="text" id="global-search" placeholder="Search History..." class="flex-1 md:w-64 p-2 bg-slate-100 border rounded-lg text-sm font-bold outline-none">
            <button onclick="deepSearch(false)" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-bold">SEARCH ALL</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <div class="text-[10px] font-black text-blue-500 uppercase mb-1" id="display-slot">Selected: Slot 1</div>
                <input type="text" id="barcode-input" placeholder="SCAN BARCODE" class="w-full p-3 border-2 border-blue-50 rounded-xl font-black text-2xl text-center uppercase focus:border-blue-500 outline-none mb-4">
                <button id="save-btn" onclick="validateAndSave()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl uppercase shadow-lg">Save & Next</button>
            </div>

            <div class="bg-white p-5 rounded-2xl border shadow-sm text-sm">
                <label class="font-bold text-slate-400 text-[10px] block mb-2 uppercase">Selection</label>
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-2 border rounded-lg mb-3 font-bold">
                <select id="rack-select" onchange="loadData()" class="w-full p-2 border rounded-lg mb-5 font-bold"></select>
                
                <div class="space-y-2 pt-2 border-t">
                    <button onclick="exportFullDay()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700">📥 Daily Backup (All Racks)</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-6 rounded-2xl border shadow-sm">
            <div id="grid" class="grid grid-cols-5 sm:grid-cols-10 gap-2"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1;
        let activeData = {};

        function checkLogin() {
            if(document.getElementById('lab-pass').value === "trumed123") {
                document.getElementById('login-overlay').style.display = 'none';
            }
        }

        function init() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=50; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid();
            loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-1.5 text-[9px] font-bold text-slate-300">${i}</span>
                    <span id="txt-${i}" class="text-[10px] font-black text-slate-800 px-1 text-center"></span>
                </div>`;
            }
        }

        // --- NEW: VALIDATE AGAINST 30 DAYS BEFORE SAVING ---
        async function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "CHECKING ARCHIVES...";

            let duplicateFound = false;
            let duplicateDetails = "";

            // Check last 30 days
            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            if(day[r][sl] === code) {
                                duplicateFound = true;
                                duplicateDetails = `Already scanned on: <b>${ds}</b> in <b>${r}</b>`;
                                break;
                            }
                        }
                        if(duplicateFound) break;
                    }
                }
                if(duplicateFound) break;
            }

            if(duplicateFound) {
                document.getElementById('modal-title').innerText = "❌ DUPLICATE DETECTED";
                document.getElementById('modal-title').className = "text-red-500 font-bold text-lg mb-2";
                document.getElementById('found-info').innerHTML = `<p>${duplicateDetails}</p><p class='mt-2 text-xs'>Entry has been blocked.</p>`;
                document.getElementById('search-modal').style.display = 'block';
                document.getElementById('barcode-input').value = '';
            } else {
                const d = document.getElementById('current-date').value;
                const r = document.getElementById('rack-select').value;
                await db.ref(`samples/${d}/${r}/slot-${currentSlot}`).set(code);
                document.getElementById('barcode-input').value = '';
                if(currentSlot < 100) setSlot(currentSlot + 1);
            }

            btn.disabled = false;
            btn.innerText = "SAVE & NEXT";
        }

        function loadData() {
            const d = document.getElementById('current-date').value;
            const r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    const val = activeData[`slot-${i}`];
                    document.getElementById(`txt-${i}`).innerText = val || '';
                    val ? el.classList.add('occupied') : el.classList.remove('occupied');
                }
            });
        }

        async function deepSearch(isValidation) {
            const term = document.getElementById('global-search').value.trim().toUpperCase();
            if(!term) return;
            document.getElementById('modal-title').innerText = "Search Result";
            document.getElementById('modal-title').className = "text-orange-400 font-bold text-lg mb-2";
            const info = document.getElementById('found-info');
            const modal = document.getElementById('search-modal');
            info.innerHTML = "Searching 30-day archives...";
            modal.style.display = 'block';

            let found = false;
            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            if(day[r][sl] === term) {
                                info.innerHTML = `<p>Date: <b>${ds}</b></p><p>Rack: <b>${r}</b></p><p>Slot: <b>${sl}</b></p>`;
                                found = true; break;
                            }
                        }
                        if(found) break;
                    }
                }
                if(found) break;
            }
            if(!found) info.innerHTML = "Not found in 30 days.";
        }

        async function exportFullDay() {
            const date = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${date}`).once('value');
            const data = snap.val();
            if(!data) return alert("No data for this date");
            let csv = "Date,Rack,Slot,Barcode\n";
            for(let r in data) {
                for(let s in data[r]) {
                    csv += `${date},${r.replace('_',' ')},${s.replace('slot-','')},${data[r][s]}\n`;
                }
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `TruMed_Full_Day_${date}.csv`;
            a.click();
        }

        function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            document.getElementById(`slot-${i}`).classList.add('selected');
            document.getElementById('display-slot').innerText = `Selected: Slot ${i}`;
            document.getElementById('barcode-input').focus();
        }
        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
        window.onload = init;
    </script>
</body>
</html>
