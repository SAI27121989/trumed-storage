<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Lab Suite Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 52px; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-weight: 800; font-size: 11px; }
        .occupied { background-color: #eff6ff; border: 2px solid #3b82f6; color: #1e40af; }
        .duplicate-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #b91c1c !important; animation: shake 0.4s ease-in-out; }
        .selected { outline: 4px solid #f59e0b; z-index: 10; transform: scale(1.05); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
        #search-results::-webkit-scrollbar { width: 4px; }
        #search-results::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body onload="initApp()">

    <header class="bg-white px-8 py-4 shadow-sm border-b flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-black italic">TM</div>
            <h1 class="text-slate-800 font-black text-xl tracking-tighter uppercase">TruMed <span class="text-blue-600">Path Labs</span></h1>
        </div>
        <div id="sync-status" class="text-[10px] font-black text-emerald-600 bg-emerald-50 px-4 py-2 rounded-lg uppercase tracking-widest border border-emerald-100">● Cloud Sync Active</div>
    </header>

    <main class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 no-print">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-6 rounded-[24px] border border-slate-200 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest" id="display-slot">Slot 1 Selected</span>
                    <span class="bg-blue-100 text-blue-700 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">Scanner Ready</span>
                </div>
                <input type="text" id="barcode-input" autocomplete="off" placeholder="SCAN BARCODE" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-black text-2xl text-center uppercase focus:border-blue-600 outline-none mb-3 bg-slate-50 transition-all">
                
                <div class="grid grid-cols-4 gap-2 mb-6">
                    <button onclick="validateAndSave()" class="col-span-3 bg-blue-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Save</button>
                    <button onclick="undoLastAction()" title="Undo Last Scan" class="col-span-1 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center hover:bg-slate-200 active:scale-95 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                        </svg>
                    </button>
                </div>
                
                <div class="space-y-2 pt-4 border-t border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Slot Actions</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="showAudit()" class="bg-slate-100 text-slate-700 font-black py-3 rounded-xl text-[10px] uppercase hover:bg-slate-200 transition-colors">View Logs</button>
                        <button onclick="deleteSingleSlot()" class="bg-red-50 text-red-600 font-black py-3 rounded-xl text-[10px] uppercase hover:bg-red-100 border border-red-100 transition-colors">Clear Slot</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[24px] border border-slate-200 shadow-sm space-y-3">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Rack Configuration</p>
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-3 border border-slate-200 rounded-xl font-bold bg-slate-50 text-sm outline-none focus:ring-2 ring-blue-500/20">
                <select id="rack-select" onchange="loadData()" class="w-full p-3 border border-slate-200 rounded-xl font-bold bg-slate-50 text-sm outline-none focus:ring-2 ring-blue-500/20"></select>
                
                <div class="grid grid-cols-2 gap-2 pt-2 pb-4 border-b border-slate-100">
                    <button onclick="window.print()" class="bg-slate-800 text-white p-3 rounded-xl font-bold text-[10px] uppercase hover:bg-black transition-all">Print</button>
                    <button onclick="exportFullDay()" class="bg-emerald-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase hover:bg-emerald-700 transition-all">Export</button>
                </div>
                <button onclick="clearFullRack()" class="w-full text-red-400 hover:text-red-600 text-[9px] font-black uppercase tracking-tighter pt-2 transition-colors">⚠ Clear Entire Rack Data</button>
            </div>
        </div>

        <div class="lg:col-span-6 bg-white p-6 rounded-[32px] border border-slate-200 shadow-sm relative">
            <div id="grid" class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>
        </div>

        <div class="lg:col-span-3 space-y-4">
            <div class="bg-slate-900 p-6 rounded-[24px] shadow-2xl min-h-[500px] flex flex-col">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-white font-black text-[11px] uppercase tracking-tighter">Archive Search</h3>
                    <div class="h-2 w-2 rounded-full bg-blue-500 animate-pulse"></div>
                </div>
                <div class="relative mb-4">
                    <input type="text" id="search-input" placeholder="Enter Barcode..." class="w-full p-4 bg-slate-800 border-none rounded-2xl text-white font-bold text-sm outline-none focus:ring-2 ring-blue-500 transition-all placeholder:text-slate-500">
                    <button onclick="deepSearch()" class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-4 rounded-xl text-[10px] font-black uppercase hover:bg-blue-500">Find</button>
                </div>
                <div id="search-results" class="flex-grow space-y-3 overflow-y-auto max-h-[600px] pr-2">
                    <div class="text-slate-500 text-[10px] font-medium italic text-center mt-10">Searching last 7 days...</div>
                </div>
            </div>

            <div id="alert-panel" class="hidden bg-white p-5 rounded-[24px] border-2 border-red-100 shadow-lg">
                <h3 class="text-red-600 font-black text-[11px] uppercase mb-3">Duplicate Alerts</h3>
                <div id="alert-list" class="space-y-3 max-h-[200px] overflow-y-auto"></div>
            </div>
        </div>
    </main>

    <div id="print-area" class="hidden p-10 bg-white">
        <h1 class="text-2xl font-black border-b-4 border-blue-900 pb-2 uppercase">TRUMED PATH LABS RACK REPORT</h1>
        <div id="print-info" class="my-6 font-bold flex gap-10 text-sm uppercase"></div>
        <table class="w-full border-collapse border-2 border-slate-800" id="print-table"></table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1, activeData = {}, lastAction = null;

        function initApp() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid(); loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-2 text-[8px] font-black text-slate-300">${i}</span>
                    <span id="txt-${i}" class="truncate px-1 pointer-events-none"></span>
                </div>`;
            }
            setSlot(1);
        }

        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            const el = document.getElementById(`slot-${i}`);
            if(el) { 
                el.classList.add('selected'); 
                document.getElementById('display-slot').innerText = `Slot ${i} Selected`; 
                document.getElementById('barcode-input').focus(); 
            }
        }

        function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            const slotToUpdate = currentSlot;

            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            db.ref(`samples/${d}/${r}/slot-${slotToUpdate}`).set({ code: code, time: timeString });
            
            lastAction = { date: d, rack: r, slot: slotToUpdate };
            document.getElementById('barcode-input').value = '';
            if(currentSlot < 100) setSlot(currentSlot + 1);
            checkDuplicates(code, slotToUpdate, d, r);
        }

        function undoLastAction() {
            if (!lastAction) return alert("Nothing to undo.");
            if (confirm(`Undo last scan in Slot ${lastAction.slot}?`)) {
                db.ref(`samples/${lastAction.date}/${lastAction.rack}/slot-${lastAction.slot}`).remove();
                setSlot(lastAction.slot);
                lastAction = null;
            }
        }

        function loadData() {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`), val = activeData[`slot-${i}`];
                    const code = val?.code || (typeof val === 'string' ? val : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    code ? el.classList.add('occupied') : el.classList.remove('occupied');
                    el.classList.remove('duplicate-error');
                }
            });
        }

        async function deepSearch() {
            const term = document.getElementById('search-input').value.trim().toUpperCase();
            const box = document.getElementById('search-results');
            if(!term) return;
            box.innerHTML = `<div class="text-[10px] font-bold text-blue-400 animate-pulse text-center mt-10 uppercase tracking-widest">Searching Archive...</div>`;
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            let found = false; box.innerHTML = '';
            snapshots.forEach((snap, i) => {
                const day = snap.val();
                if(!day) return;
                for(let r in day) for(let sl in day[r]) {
                    if((day[r][sl]?.code || day[r][sl]) === term) {
                        found = true;
                        box.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-blue-500 mb-2">
                            <div class="flex justify-between items-start">
                                <p class="text-white font-black text-sm">${term}</p>
                                <span class="text-[8px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded uppercase">${dates[i]}</span>
                            </div>
                            <div class="mt-2 text-[9px] text-slate-400 font-bold uppercase tracking-tight">
                                ${r.replace('_',' ')} • SLOT ${sl.replace('slot-','')}
                            </div>
                        </div>`;
                    }
                }
            });
            if(!found) box.innerHTML = `<div class="text-red-400 text-[10px] font-bold text-center mt-10 uppercase">Not found in 7 days</div>`;
        }

        async function checkDuplicates(code, slotId, currDate, currRack) {
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            snapshots.forEach((snap, i) => {
                const day = snap.val();
                if(!day) return;
                for(let rack in day) for(let sl in day[rack]) {
                    const val = day[rack][sl]?.code || day[rack][sl];
                    if(val === code && (rack !== currRack || sl !== `slot-${slotId}`)) {
                        document.getElementById(`slot-${slotId}`).classList.add('duplicate-error');
                        addAlert(code, dates[i], rack, sl.replace('slot-',''));
                    }
                }
            });
        }

        function addAlert(code, date, rack, slot) {
            document.getElementById('alert-panel').classList.remove('hidden');
            const div = document.createElement('div');
            div.className = "p-3 bg-red-50 rounded-xl border border-red-100 flex flex-col mb-2";
            div.innerHTML = `<span class="text-red-700 font-black text-xs">${code}</span>
                             <span class="text-[9px] text-slate-500 font-bold uppercase tracking-tight">${date} • ${rack} • Slot ${slot}</span>`;
            document.getElementById('alert-list').prepend(div);
        }

        function deleteSingleSlot() {
            if(confirm('Clear this slot?')) {
                db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove();
            }
        }

        function clearFullRack() {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            if (confirm(`DANGER: Delete ALL data in ${r} on ${d}?`)) {
                if (prompt("Type 'DELETE' to confirm") === 'DELETE') db.ref(`samples/${d}/${r}`).remove();
            }
        }

        function showAudit() {
            const d = activeData[`slot-${currentSlot}`];
            if(!d) return alert("Slot is empty.");
            alert(`AUDIT LOG\nBarcode: ${d.code||d}\nStored: ${d.time||'N/A'}`);
        }

        async function exportFullDay() {
            const d = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${d}`).once('value');
            const data = snap.val();
            let csv = "RACK,POSITION,BARCODE,TIME\n";
            for(let r in data) for(let s in data[r]) {
                const item = data[r][s];
                csv += `${r},${s.replace('slot-','')},${item.code||item},"${item.time||''}"\n`;
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `TruMed_${d}.csv`; a.click();
        }

        window.onbeforeprint = () => {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            document.getElementById('print-info').innerHTML = `<span>DATE: ${d}</span><span>RACK: ${r}</span>`;
            let h = '<tr><th class="border-2 border-slate-800 p-2">SLOT</th><th class="border-2 border-slate-800 p-2">BARCODE</th><th class="border-2 border-slate-800 p-2">TIME</th></tr>';
            for(let i=1; i<=100; i++) {
                const val = activeData[`slot-${i}`];
                if(val) h += `<tr><td class="border-2 border-slate-800 p-2 text-center font-black">${i}</td><td class="border-2 border-slate-800 p-2 font-black">${val.code||val}</td><td class="border-2 border-slate-800 p-2 text-xs">${val.time||'-'}</td></tr>`;
            }
            document.getElementById('print-table').innerHTML = h;
        };

        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
    </script>
</body>
</html>
