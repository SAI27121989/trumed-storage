<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Ultra-Fast Offline Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 60px; border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.1s ease; cursor: pointer; }
        .occupied { background-color: #f0f7ff; border: 1.5px solid #3b82f6; }
        .selected { outline: 3px solid #f59e0b; background-color: #fffbeb; z-index: 10; transform: translateY(-1px); }
        .syncing { opacity: 0.6; border-style: dashed; }
        .modal { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 24px; border-radius: 20px; z-index: 50; display: none; width: 90%; max-width: 400px; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } .no-print { display: none !important; } }
    </style>
</head>
<body onload="initApp()">

    <div id="info-modal" class="modal">
        <h3 id="modal-title" class="text-blue-400 font-black text-xl mb-4 uppercase italic">System Log</h3>
        <div id="modal-body" class="text-sm font-medium"></div>
        <button onclick="closeModal()" class="mt-8 w-full bg-slate-800 py-3 rounded-xl font-bold">Dismiss</button>
    </div>

    <header class="bg-white px-10 py-5 shadow-sm border-b flex flex-col lg:row justify-between items-center gap-6 no-print">
        <h1 class="text-blue-900 font-black text-2xl">TruMed Path Labs India Pvt Ltd</h1>
        <div class="flex gap-2 w-full max-w-md">
            <span id="sync-status" class="text-[10px] bg-emerald-100 text-emerald-700 px-3 py-2 rounded-full font-bold uppercase self-center">Cloud Synced</span>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10 no-print">
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white p-8 rounded-[32px] border shadow-sm">
                <div class="text-[11px] font-black text-blue-600 uppercase mb-3" id="display-slot">Position: Slot 1</div>
                <input type="text" id="barcode-input" placeholder="SCAN BARCODE" class="w-full p-5 border-2 border-slate-50 rounded-2xl font-black text-3xl text-center uppercase focus:border-blue-500 outline-none mb-5 bg-slate-50">
                <button id="save-btn" onclick="validateAndSave()" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl uppercase shadow-xl hover:bg-blue-700 active:scale-95 transition-all">Instant Save</button>
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <button onclick="deleteSingleSlot()" class="bg-slate-50 text-slate-400 font-bold py-3 rounded-xl text-[10px] uppercase">Clear</button>
                    <button onclick="showAudit()" class="bg-slate-50 text-slate-500 font-bold py-3 rounded-xl text-[10px] uppercase">Audit</button>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[32px] border shadow-sm space-y-4">
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 text-sm">
                <select id="rack-select" onchange="loadData()" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 text-sm"></select>
                <button onclick="exportFullDay()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black text-[11px] uppercase shadow-lg">Excel Backup</button>
                <button onclick="printRackReport()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-[11px] uppercase shadow-lg">Print Report</button>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-10 rounded-[40px] border shadow-sm">
            <div id="grid" class="grid grid-cols-5 md:grid-cols-10 gap-4"></div>
        </div>
    </main>

    <div id="print-area" class="p-10 bg-white hidden">
        <h1 class="text-2xl font-black">TRUMED PATH LABS</h1>
        <p id="print-date-display" class="font-bold mt-4"></p>
        <p id="print-rack-display" class="font-bold mb-6"></p>
        <table class="w-full border-collapse border border-black" id="print-table"></table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1, activeData = {};

        function initApp() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid(); loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-2 text-[9px] font-black text-slate-200">${i}</span>
                    <span id="txt-${i}" class="text-[11px] font-black text-slate-800 truncate px-1"></span>
                </div>`;
            }
        }

        async function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            
            // 1. INSTANT UI UPDATE (NO WAITING)
            const date = document.getElementById('current-date').value;
            const rack = document.getElementById('rack-select').value;
            const slotToUpdate = currentSlot;
            
            document.getElementById(`txt-${slotToUpdate}`).innerText = code;
            document.getElementById(`slot-${slotToUpdate}`).classList.add('occupied', 'syncing');
            document.getElementById('barcode-input').value = '';
            
            if(currentSlot < 100) setSlot(currentSlot + 1);
            
            // 2. BACKGROUND CLOUD SYNC
            document.getElementById('sync-status').innerText = "Syncing...";
            document.getElementById('sync-status').className = "text-[10px] bg-orange-100 text-orange-700 px-3 py-2 rounded-full font-bold uppercase self-center";

            try {
                // Parallel Duplicate Check
                const dates = Array.from({length: 7}, (_, i) => {
                    let d = new Date(); d.setDate(d.getDate() - i);
                    return d.toISOString().split('T')[0];
                });
                const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
                
                let dupFound = false;
                for(let i=0; i<snapshots.length; i++) {
                    const dayData = snapshots[i].val();
                    if(!dayData) continue;
                    for(let r in dayData) {
                        for(let sl in dayData[r]) {
                            if((dayData[r][sl]?.code || dayData[r][sl]) === code && (r !== rack || sl !== `slot-${slotToUpdate}`)) {
                                dupFound = true; alert(`⚠️ DUPLICATE DETECTED: ${code} exists on ${dates[i]} in ${r}`); break;
                            }
                        }
                        if(dupFound) break;
                    }
                    if(dupFound) break;
                }

                if(!dupFound) {
                    await db.ref(`samples/${date}/${rack}/slot-${slotToUpdate}`).set({ code: code, time: new Date().toLocaleString() });
                } else {
                    // Undo UI update if duplicate
                    document.getElementById(`txt-${slotToUpdate}`).innerText = '';
                    document.getElementById(`slot-${slotToUpdate}`).classList.remove('occupied');
                }
            } catch (e) { console.error("Sync Error", e); }
            
            document.getElementById(`slot-${slotToUpdate}`).classList.remove('syncing');
            document.getElementById('sync-status').innerText = "Cloud Synced";
            document.getElementById('sync-status').className = "text-[10px] bg-emerald-100 text-emerald-700 px-3 py-2 rounded-full font-bold uppercase self-center";
        }

        function loadData() {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`), val = activeData[`slot-${i}`];
                    const code = val?.code || (typeof val === 'string' ? val : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    code ? el.classList.add('occupied') : el.classList.remove('occupied');
                }
            });
        }

        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            document.getElementById(`slot-${i}`).classList.add('selected');
            document.getElementById('display-slot').innerText = `Position: Slot ${i}`;
            document.getElementById('barcode-input').focus();
        }

        function printRackReport() {
            document.getElementById('print-date-display').innerText = `Date: ${document.getElementById('current-date').value}`;
            document.getElementById('print-rack-display').innerText = `Rack: ${document.getElementById('rack-select').value}`;
            let html = '<tr><th border="1">Slot</th><th border="1">Barcode</th></tr>';
            for(let i=1; i<=100; i++) {
                const d = activeData[`slot-${i}`];
                if(d) html += `<tr><td>${i}</td><td>${d.code||d}</td></tr>`;
            }
            document.getElementById('print-table').innerHTML = html;
            window.print();
        }

        async function exportFullDay() {
            const date = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${date}`).once('value');
            const data = snap.val();
            let csv = "RACK,SLOT,BARCODE\n";
            for(let r in data) for(let s in data[r]) csv += `${r},${s.replace('slot-','')},${data[r][s].code||data[r][s]}\n`;
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download=`TruMed_${date}.csv`; a.click();
        }

        function deleteSingleSlot() { if(confirm('Clear slot?')) db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove(); }
        function showAudit() { 
            const d = activeData[`slot-${currentSlot}`];
            alert(d ? `Barcode: ${d.code||d}\nTime: ${d.time||'N/A'}` : "Slot is empty");
        }
        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
    </script>
</body>
</html>
