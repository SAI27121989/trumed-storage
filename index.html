<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Lab Suite Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 52px; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; font-weight: 800; font-size: 11px; }
        .occupied { background-color: #eff6ff; border: 1.5px solid #3b82f6; color: #1e40af; }
        .duplicate-error { background-color: #fee2e2 !important; border: 2px solid #ef4444 !important; color: #b91c1c !important; animation: shake 0.4s ease-in-out; }
        .selected { outline: 3px solid #f59e0b; z-index: 10; transform: scale(1.03); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body onload="initApp()">

    <header class="bg-white px-8 py-4 shadow-sm border-b flex justify-between items-center no-print">
        <h1 class="text-blue-900 font-black text-xl tracking-tighter italic">TRUMED PATH LABS INDIA PVT LTD</h1>
        <div id="sync-status" class="text-[10px] font-black text-emerald-500 bg-emerald-50 px-4 py-1.5 rounded-full uppercase tracking-widest">Instant Cloud Sync Active</div>
    </header>

    <main class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 no-print">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-6 rounded-[32px] border shadow-sm border-slate-200">
                <div class="text-[10px] font-black text-blue-500 uppercase mb-2" id="display-slot">Slot 1 Selected</div>
                <input type="text" id="barcode-input" autocomplete="off" placeholder="SCAN BARCODE" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-black text-2xl text-center uppercase focus:border-blue-600 outline-none mb-4 bg-slate-50">
                <button onclick="validateAndSave()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg hover:bg-blue-700 active:scale-95 transition-all">Instant Save</button>
                
                <div class="mt-6 pt-6 border-t border-slate-100 space-y-2">
                    <p class="text-[10px] font-black text-red-400 uppercase tracking-widest ml-1">Danger Zone</p>
                    <button onclick="deleteSingleSlot()" class="w-full bg-red-50 text-red-600 font-black py-3 rounded-xl text-xs uppercase hover:bg-red-100 transition-colors">Delete Selected Slot</button>
                    <button onclick="showAudit()" class="w-full bg-slate-50 text-slate-500 font-black py-3 rounded-xl text-xs uppercase hover:bg-slate-100 transition-colors italic">Audit History</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[32px] border shadow-sm space-y-3">
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm">
                <select id="rack-select" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm"></select>
                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button onclick="window.print()" class="bg-slate-900 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Print</button>
                    <button onclick="exportFullDay()" class="bg-emerald-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Export</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 bg-white p-8 rounded-[40px] border shadow-sm border-slate-200">
            <div id="grid" class="grid grid-cols-5 md:grid-cols-10 gap-3"></div>
        </div>

        <div class="lg:col-span-3 space-y-4">
            <div class="bg-slate-900 p-6 rounded-[32px] shadow-xl">
                <h3 class="text-white font-black text-[11px] uppercase tracking-widest mb-4 flex justify-between items-center">
                    <span>Archive Search</span>
                    <span class="text-blue-400 text-[9px]">Last 7 Days</span>
                </h3>
                <div class="flex flex-col gap-2">
                    <input type="text" id="search-input" placeholder="Enter Barcode..." class="w-full p-4 bg-slate-800 border-none rounded-2xl text-white font-bold text-sm outline-none focus:ring-2 ring-blue-500">
                    <button onclick="deepSearch()" class="w-full bg-blue-500 text-white font-black py-3 rounded-2xl uppercase text-xs hover:bg-blue-400">Find Sample</button>
                </div>
                <div id="search-results" class="mt-4 space-y-2"></div>
            </div>

            <div id="alert-panel" class="hidden bg-white p-6 rounded-[32px] border-2 border-red-50 shadow-sm">
                <h3 class="text-red-600 font-black text-[11px] uppercase mb-4 tracking-widest">Duplicate Alerts</h3>
                <div id="alert-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>

    <div id="print-area" class="hidden p-10 bg-white">
        <h1 class="text-2xl font-black border-b-4 border-blue-900 pb-2 uppercase">TRUMED PATH LABS RACK REPORT</h1>
        <div id="print-info" class="my-6 font-bold flex gap-10 text-sm"></div>
        <table class="w-full border-collapse border-2 border-slate-800" id="print-table"></table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1, activeData = {};

        function initApp() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid(); loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-1.5 text-[7px] font-black text-slate-300 opacity-50">${i}</span>
                    <span id="txt-${i}" class="truncate px-1"></span>
                </div>`;
            }
            setSlot(1);
        }

        function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            const slotToUpdate = currentSlot;

            // Instant UI Update
            document.getElementById(`txt-${slotToUpdate}`).innerText = code;
            document.getElementById(`slot-${slotToUpdate}`).classList.add('occupied');
            document.getElementById(`slot-${slotToUpdate}`).classList.remove('duplicate-error');
            
            document.getElementById('barcode-input').value = '';
            if(currentSlot < 100) setSlot(currentSlot + 1);

            // Cloud Save
            db.ref(`samples/${d}/${r}/slot-${slotToUpdate}`).set({ code: code, time: new Date().toLocaleString() });
            
            // Background Duplicate Check
            checkDuplicates(code, slotToUpdate, d, r);
        }

        async function checkDuplicates(code, slotId, currDate, currRack) {
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            snapshots.forEach((snap, i) => {
                const day = snap.val();
                if(!day) return;
                for(let rack in day) {
                    for(let sl in day[rack]) {
                        const val = day[rack][sl]?.code || day[rack][sl];
                        if(val === code && (rack !== currRack || sl !== `slot-${slotId}`)) {
                            document.getElementById(`slot-${slotId}`).classList.add('duplicate-error');
                            addAlert(code, dates[i], rack, sl.replace('slot-',''));
                        }
                    }
                }
            });
        }

        async function deepSearch() {
            const term = document.getElementById('search-input').value.trim().toUpperCase();
            const box = document.getElementById('search-results');
            if(!term) return;
            box.innerHTML = `<div class="text-[10px] font-bold text-blue-400 animate-pulse">SCANNING ARCHIVES...</div>`;
            
            const dates = Array.from({length: 7}, (_, i) => {
                let d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            const snapshots = await Promise.all(dates.map(ds => db.ref(`samples/${ds}`).once('value')));
            let found = false; box.innerHTML = '';

            snapshots.forEach((snap, i) => {
                const day = snap.val();
                if(!day) return;
                for(let r in day) {
                    for(let sl in day[r]) {
                        if((day[r][sl]?.code || day[r][sl]) === term) {
                            found = true;
                            box.innerHTML += `
                                <div class="bg-slate-800 p-4 rounded-2xl border-l-4 border-blue-500">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Found Sample</p>
                                    <p class="text-white font-black text-lg">${term}</p>
                                    <div class="mt-2 text-[10px] text-blue-300 font-black">
                                        ${dates[i]} | ${r} | SLOT ${sl.replace('slot-','')}
                                    </div>
                                </div>`;
                        }
                    }
                }
            });
            if(!found) box.innerHTML = `<div class="text-red-400 text-[10px] font-bold">NO RESULTS IN 7-DAY HISTORY</div>`;
        }

        function addAlert(code, date, rack, slot) {
            document.getElementById('alert-panel').classList.remove('hidden');
            const div = document.createElement('div');
            div.className = "p-3 bg-red-50 rounded-xl border border-red-100 flex flex-col";
            div.innerHTML = `<span class="text-red-700 font-black text-xs">${code}</span>
                             <span class="text-[9px] text-slate-500 font-bold uppercase tracking-tight">Exists: ${date} • ${rack} • Slot ${slot}</span>`;
            document.getElementById('alert-list').prepend(div);
        }

        function loadData() {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`), val = activeData[`slot-${i}`];
                    const code = val?.code || (typeof val === 'string' ? val : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    code ? el.classList.add('occupied') : el.classList.remove('occupied');
                    el.classList.remove('duplicate-error');
                }
            });
        }

        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            const el = document.getElementById(`slot-${i}`);
            if(el) { el.classList.add('selected'); document.getElementById('display-slot').innerText = `Slot ${i} Selected`; document.getElementById('barcode-input').focus(); }
        }

        function showAudit() {
            const d = activeData[`slot-${currentSlot}`];
            if(!d) return alert("Slot is empty.");
            alert(`AUDIT LOG\n------------------\nBarcode: ${d.code||d}\nStored at: ${d.time||'N/A'}`);
        }

        function deleteSingleSlot() {
            if(confirm('Are you sure you want to clear this slot?')) {
                db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove();
            }
        }

        async function exportFullDay() {
            const d = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${d}`).once('value');
            const data = snap.val();
            let csv = "RACK,POSITION,BARCODE,TIME\n";
            for(let r in data) for(let s in data[r]) {
                const item = data[r][s];
                csv += `${r},${s.replace('slot-','')},${item.code||item},"${item.time||''}"\n`;
            }
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `TruMed_${d}.csv`; a.click();
        }

        window.onbeforeprint = () => {
            const d = document.getElementById('current-date').value, r = document.getElementById('rack-select').value;
            document.getElementById('print-info').innerHTML = `<span>DATE: ${d}</span><span>RACK: ${r}</span>`;
            let h = '<tr><th class="border-2 border-slate-800 p-2">SLOT</th><th class="border-2 border-slate-800 p-2">BARCODE</th><th class="border-2 border-slate-800 p-2">TIME</th></tr>';
            for(let i=1; i<=100; i++) {
                const val = activeData[`slot-${i}`];
                if(val) h += `<tr><td class="border-2 border-slate-800 p-2 text-center font-black">${i}</td><td class="border-2 border-slate-800 p-2 font-black">${val.code||val}</td><td class="border-2 border-slate-800 p-2 text-xs">${val.time||'-'}</td></tr>`;
            }
            document.getElementById('print-table').innerHTML = h;
        };

        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
    </script>
</body>
</html>
