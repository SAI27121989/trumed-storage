<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Ultimate Lab Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --trumed-blue: #007399; }
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 60px; border-radius: 8px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .occupied { background-color: #f0f9ff; border: 1px solid #0ea5e9; box-shadow: inset 0 0 10px rgba(14, 165, 233, 0.05); }
        .selected { outline: 3px solid #f59e0b; background-color: #fffbeb; z-index: 10; transform: scale(1.02); }
        #login-overlay { position: fixed; inset: 0; background: #ffffff; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .search-modal { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 24px; border-radius: 16px; z-index: 50; display: none; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="p-10 border rounded-3xl shadow-2xl w-96 text-center bg-white">
            <div class="mb-6">
                <h1 class="text-3xl font-black text-blue-900">TRUMED</h1>
                <p class="text-xs text-slate-400 font-bold tracking-widest uppercase">Path Labs India Pvt Ltd</p>
            </div>
            <input type="password" id="lab-pass" placeholder="Enter Access Key" class="w-full p-4 border-2 border-slate-100 rounded-xl mb-4 text-center text-xl outline-none focus:border-blue-500">
            <button onclick="checkLogin()" class="w-full bg-blue-800 text-white py-4 rounded-xl font-black hover:bg-blue-900 transition-all shadow-lg shadow-blue-100">UNLOCK SYSTEM</button>
            <p id="err" class="text-red-500 text-xs mt-4 hidden font-bold">Access Denied: Incorrect Password</p>
        </div>
    </div>

    <div id="search-modal" class="search-modal">
        <h3 id="modal-title" class="text-orange-400 font-bold text-xl mb-3">Notice</h3>
        <div id="found-info" class="space-y-2 text-sm leading-relaxed"></div>
        <button onclick="closeSearch()" class="mt-6 w-full bg-slate-700 py-3 rounded-lg font-bold hover:bg-slate-600">Close</button>
    </div>

    <header class="bg-white px-8 py-4 shadow-sm border-b flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="bg-blue-900 text-white p-2 rounded-lg font-black text-xl">TM</div>
            <div>
                <h1 class="text-blue-900 font-black text-xl leading-tight">TruMed Path Labs India Pvt Ltd</h1>
                <div class="flex gap-2 items-center">
                    <span class="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold uppercase">Cloud Storage Online</span>
                    <span id="stat-counter" class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold uppercase">0/100 Slots Full</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <input type="text" id="global-search" placeholder="Search 30-Day Archive..." class="flex-1 md:w-72 p-3 bg-slate-50 border rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-blue-400">
            <button onclick="deepSearch()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-black hover:bg-blue-700 shadow-md">FIND</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="text-[10px] font-black text-blue-500 uppercase mb-2 tracking-tighter" id="display-slot">ACTIVE TARGET: SLOT 1</div>
                <input type="text" id="barcode-input" placeholder="SCAN BARCODE" class="w-full p-4 border-2 border-blue-50 rounded-2xl font-black text-3xl text-center uppercase focus:border-blue-600 outline-none mb-4 bg-slate-50">
                
                <div class="space-y-2">
                    <button id="save-btn" onclick="validateAndSave()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl uppercase shadow-xl shadow-emerald-100 hover:bg-emerald-700 hover:-translate-y-1 transition-all">Save & Next</button>
                    <button onclick="deleteSingleSlot()" class="w-full text-red-500 font-bold py-2 text-xs hover:bg-red-50 rounded-lg">Remove Slot Data</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                <div>
                    <label class="font-black text-slate-400 text-[10px] block mb-2 uppercase">Date Context</label>
                    <input type="date" id="current-date" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm">
                </div>
                <div>
                    <label class="font-black text-slate-400 text-[10px] block mb-2 uppercase">Storage Rack</label>
                    <select id="rack-select" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm"></select>
                </div>
                
                <div class="pt-4 border-t space-y-2">
                    <button onclick="exportFullDay()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold text-xs">📥 Daily CSV Backup</button>
                    <div class="relative">
                        <input type="file" id="restore-file" onchange="restoreFromCSV()" class="hidden">
                        <button onclick="document.getElementById('restore-file').click()" class="w-full border-2 border-dashed border-slate-200 text-slate-400 p-3 rounded-xl font-bold text-xs hover:border-blue-300 hover:text-blue-500">📤 Restore from File</button>
                    </div>
                    <button onclick="clearFullRack()" class="w-full text-slate-300 text-[9px] font-bold pt-4 uppercase tracking-widest hover:text-red-500">Format Rack</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-8 rounded-3xl border shadow-sm">
            <div id="grid" class="grid grid-cols-4 sm:grid-cols-10 gap-3"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1;
        let activeData = {};

        function checkLogin() {
            if(document.getElementById('lab-pass').value === "trumed123") {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        function init() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid();
            loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-2 text-[10px] font-bold text-slate-300">${i}</span>
                    <span id="txt-${i}" class="text-[11px] font-black text-slate-700 px-1 text-center break-all"></span>
                </div>`;
            }
        }

        async function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "SECURITY SCAN...";

            let duplicateFound = false;
            let logDetails = "";

            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            if(day[r][sl] === code) {
                                duplicateFound = true;
                                logDetails = `Found on ${ds} in ${r}`;
                                break;
                            }
                        }
                        if(duplicateFound) break;
                    }
                }
                if(duplicateFound) break;
            }

            if(duplicateFound) {
                alert("❌ REJECTED: Barcode " + code + "\n" + logDetails);
                document.getElementById('barcode-input').value = '';
            } else {
                const d = document.getElementById('current-date').value;
                const r = document.getElementById('rack-select').value;
                await db.ref(`samples/${d}/${r}/slot-${currentSlot}`).set(code);
                document.getElementById('barcode-input').value = '';
                if(currentSlot < 100) setSlot(currentSlot + 1);
            }
            btn.disabled = false; btn.innerText = "SAVE & NEXT";
        }

        function loadData() {
            const d = document.getElementById('current-date').value;
            const r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                let count = 0;
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    const val = activeData[`slot-${i}`];
                    document.getElementById(`txt-${i}`).innerText = val || '';
                    if(val) { el.classList.add('occupied'); count++; } 
                    else { el.classList.remove('occupied'); }
                }
                document.getElementById('stat-counter').innerText = `${count}/100 Slots Full`;
            });
        }

        async function restoreFromCSV() {
            const file = document.getElementById('restore-file').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n');
                const d = document.getElementById('current-date').value;
                const r = document.getElementById('rack-select').value;
                for(let i=1; i<lines.length; i++) {
                    const parts = lines[i].split(',');
                    if(parts.length >= 2 && parts[1].trim()) {
                        await db.ref(`samples/${d}/${r}/slot-${parts[0].trim()}`).set(parts[1].trim());
                    }
                }
                alert("Restoration Complete!");
            };
            reader.readAsText(file);
        }

        async function exportFullDay() {
            const date = document.getElementById('current-date').value;
            const snap = await db.ref(`samples/${date}`).once('value');
            const data = snap.val();
            if(!data) return alert("Empty Date");
            let csv = "Slot,Barcode,Rack\n";
            for(let r in data) {
                for(let s in data[r]) csv += `${s.replace('slot-','')},${data[r][s]},${r}\n`;
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `TruMed_Backup_${date}.csv`; a.click();
        }

        async function deepSearch() {
            const term = document.getElementById('global-search').value.trim().toUpperCase();
            if(!term) return;
            const info = document.getElementById('found-info');
            const modal = document.getElementById('search-modal');
            info.innerHTML = "Querying 30-Day Cloud Data...";
            modal.style.display = 'block';
            let found = false;
            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            if(day[r][sl] === term) {
                                info.innerHTML = `<div class='bg-slate-800 p-4 rounded-xl border border-slate-700'>
                                    <p class='text-slate-400'>Storage Date</p><p class='font-black text-lg'>${ds}</p>
                                    <p class='text-slate-400 mt-2'>Rack Location</p><p class='font-black text-lg'>${r.replace('_',' ')}</p>
                                    <p class='text-slate-400 mt-2'>Slot Position</p><p class='font-black text-lg'>${sl.replace('slot-','')}</p>
                                </div>`;
                                found = true; break;
                            }
                        }
                        if(found) break;
                    }
                }
                if(found) break;
            }
            if(!found) info.innerHTML = "No record found in the 30-day archive.";
        }

        function deleteSingleSlot() {
            if(confirm(`Wipe Slot ${currentSlot}?`)) {
                db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}/slot-${currentSlot}`).remove();
            }
        }
        function closeSearch() { document.getElementById('search-modal').style.display = 'none'; }
        function setSlot(i) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            currentSlot = i;
            document.getElementById(`slot-${i}`).classList.add('selected');
            document.getElementById('display-slot').innerText = `ACTIVE TARGET: SLOT ${i}`;
            document.getElementById('barcode-input').focus();
        }
        function clearFullRack() {
            if(confirm("DANGER: WIPE ENTIRE RACK?")) {
                db.ref(`samples/${document.getElementById('current-date').value}/${document.getElementById('rack-select').value}`).remove();
            }
        }
        document.getElementById('barcode-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateAndSave(); });
        window.onload = init;
    </script>
</body>
</html>
