<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruMed | Professional Sample Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .slot { border: 1px solid #e2e8f0; background: white; min-height: 60px; border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .occupied { background-color: #eff6ff; border: 1px solid #3b82f6; }
        .selected { outline: 3px solid #f59e0b; background-color: #fffbeb; z-index: 10; transform: scale(1.02); }
        #login-overlay { position: fixed; inset: 0; background: #ffffff; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 24px; border-radius: 16px; z-index: 50; display: none; width: 90%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="p-10 border rounded-3xl shadow-2xl w-96 text-center bg-white">
            <h1 class="text-3xl font-black text-blue-900 mb-2">TRUMED</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-6">Sample Management System</p>
            <input type="password" id="lab-pass" placeholder="Enter Password" class="w-full p-4 border rounded-xl mb-4 text-center text-xl outline-none focus:border-blue-500">
            <button onclick="checkLogin()" class="w-full bg-blue-800 text-white py-4 rounded-xl font-black hover:bg-blue-900 shadow-lg">LOGIN</button>
            <p id="err" class="text-red-500 text-xs mt-4 hidden font-bold">Incorrect Access Key</p>
        </div>
    </div>

    <div id="info-modal" class="modal">
        <h3 id="modal-title" class="text-orange-400 font-bold text-xl mb-3">Notice</h3>
        <div id="modal-body" class="text-sm space-y-2"></div>
        <button onclick="closeModal()" class="mt-6 w-full bg-slate-700 py-3 rounded-lg font-bold">Close</button>
    </div>

    <header class="bg-white px-8 py-4 shadow-sm border-b flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
            <h1 class="text-blue-900 font-black text-xl">TruMed Path Labs India Pvt Ltd</h1>
            <div class="flex gap-2">
                <span class="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-bold uppercase">Strict 30-Day Duplicate Block Active</span>
                <span id="stat-counter" class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold uppercase">0/100 Full</span>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <input type="text" id="global-search" placeholder="Search 30-Day Archive..." class="flex-1 md:w-72 p-3 bg-slate-50 border rounded-xl text-sm outline-none">
            <button onclick="deepSearch()" class="bg-orange-500 text-white px-6 py-2 rounded-xl text-sm font-black shadow-md">SEARCH ALL</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                <div class="text-[10px] font-black text-blue-500 uppercase mb-2" id="display-slot">Selected: Slot 1</div>
                <input type="text" id="barcode-input" placeholder="SCAN BARCODE" class="w-full p-4 border-2 border-blue-50 rounded-2xl font-black text-3xl text-center uppercase focus:border-blue-600 outline-none mb-4 bg-slate-50">
                
                <div class="space-y-2">
                    <button id="save-btn" onclick="validateAndSave()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl uppercase shadow-lg hover:bg-emerald-700 transition-all">Save & Next</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="deleteSingleSlot()" class="bg-red-50 text-red-600 font-bold py-2 rounded-lg text-[10px] uppercase border border-red-100">Delete Slot</button>
                        <button onclick="showAudit()" class="bg-slate-50 text-slate-600 font-bold py-2 rounded-lg text-[10px] uppercase border border-slate-100">Audit Log</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                <input type="date" id="current-date" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm">
                <select id="rack-select" onchange="loadData()" class="w-full p-3 border rounded-xl font-bold bg-slate-50 text-sm"></select>
                
                <div class="pt-4 border-t space-y-2">
                    <button onclick="exportFullDay()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-xs uppercase shadow-md">Daily Backup (CSV)</button>
                    <div class="relative">
                        <input type="file" id="restore-file" onchange="restoreFromCSV()" class="hidden">
                        <button onclick="document.getElementById('restore-file').click()" class="w-full border-2 border-dashed border-slate-200 text-slate-400 p-3 rounded-xl font-bold text-xs hover:text-blue-500 hover:border-blue-400 transition-all">Restore from CSV</button>
                    </div>
                    <button onclick="clearFullRack()" class="w-full text-slate-300 text-[9px] font-bold mt-2 uppercase hover:text-red-500">Format Entire Rack</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 bg-white p-8 rounded-3xl border shadow-sm">
            <div id="grid" class="grid grid-cols-5 sm:grid-cols-10 gap-3"></div>
        </div>
    </main>

    <script>
        // --- Password Setting ---
        let labPassword = "trumed123"; 

        const firebaseConfig = {
            apiKey: "AIzaSyB20KIK_mKTOg-tduRlAZt7ky67CFF8eZY",
            authDomain: "trumed-lab.firebaseapp.com",
            databaseURL: "https://trumed-lab-default-rtdb.firebaseio.com",
            projectId: "trumed-lab",
            storageBucket: "trumed-lab.firebasestorage.app",
            messagingSenderId: "862451783749",
            appId: "1:862451783749:web:faabd463209ec3da162b2c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentSlot = 1;
        let activeData = {};

        function checkLogin() {
            if(document.getElementById('lab-pass').value === labPassword) {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                document.getElementById('err').classList.remove('hidden');
            }
        }

        function init() {
            const select = document.getElementById('rack-select');
            for(let i=1; i<=100; i++) { 
                let o = document.createElement('option'); o.value = `Rack_${i}`; o.innerText = `Rack ${i}`; select.appendChild(o); 
            }
            document.getElementById('current-date').value = new Date().toISOString().split('T')[0];
            renderGrid();
            loadData();
        }

        function renderGrid() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let i=1; i<=100; i++) {
                g.innerHTML += `<div id="slot-${i}" class="slot" onclick="setSlot(${i})">
                    <span class="absolute top-1 left-2 text-[10px] font-bold text-slate-300">${i}</span>
                    <span id="txt-${i}" class="text-[11px] font-black text-slate-700 px-1 text-center"></span>
                </div>`;
            }
        }

        async function validateAndSave() {
            const code = document.getElementById('barcode-input').value.trim().toUpperCase();
            if(!code) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.innerText = "CHECKING ARCHIVES...";

            let duplicateFound = false;
            let foundMsg = "";

            // --- STRICT 30-DAY CHECK ---
            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            const val = day[r][sl]?.code || day[r][sl];
                            if(val === code) {
                                duplicateFound = true;
                                foundMsg = `Found on ${ds} in ${r}`;
                                break;
                            }
                        }
                        if(duplicateFound) break;
                    }
                }
                if(duplicateFound) break;
            }

            if(duplicateFound) {
                alert("❌ DUPLICATE BLOCKED\n" + foundMsg);
                document.getElementById('barcode-input').value = '';
            } else {
                const date = document.getElementById('current-date').value;
                const rack = document.getElementById('rack-select').value;
                const entry = { code: code, time: new Date().toLocaleTimeString() };
                await db.ref(`samples/${date}/${rack}/slot-${currentSlot}`).set(entry);
                document.getElementById('barcode-input').value = '';
                if(currentSlot < 100) setSlot(currentSlot + 1);
            }
            btn.disabled = false; btn.innerText = "SAVE & NEXT";
        }

        function loadData() {
            const d = document.getElementById('current-date').value;
            const r = document.getElementById('rack-select').value;
            db.ref(`samples/${d}/${r}`).on('value', (s) => {
                activeData = s.val() || {};
                let count = 0;
                for(let i=1; i<=100; i++) {
                    const el = document.getElementById(`slot-${i}`);
                    const data = activeData[`slot-${i}`];
                    const code = data?.code || (typeof data === 'string' ? data : '');
                    document.getElementById(`txt-${i}`).innerText = code;
                    if(code) { el.classList.add('occupied'); count++; } 
                    else { el.classList.remove('occupied'); }
                }
                document.getElementById('stat-counter').innerText = `${count}/100 Full`;
            });
        }

        function showAudit() {
            const data = activeData[`slot-${currentSlot}`];
            const modal = document.getElementById('info-modal');
            document.getElementById('modal-title').innerText = `Audit: Slot ${currentSlot}`;
            document.getElementById('modal-body').innerHTML = data?.time 
                ? `<div class='bg-slate-700 p-3 rounded'>Barcode: <b>${data.code}</b><br>Logged: <b>${data.time}</b></div>`
                : "No data in this slot.";
            modal.style.display = 'block';
        }

        async function deepSearch() {
            const term = document.getElementById('global-search').value.trim().toUpperCase();
            if(!term) return;
            const body = document.getElementById('modal-body');
            const modal = document.getElementById('info-modal');
            document.getElementById('modal-title').innerText = "30-Day Search";
            body.innerHTML = "Searching...";
            modal.style.display = 'block';
            let found = false;
            for (let i = 0; i < 30; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let ds = d.toISOString().split('T')[0];
                const s = await db.ref(`samples/${ds}`).once('value');
                const day = s.val();
                if(day) {
                    for(let r in day) {
                        for(let sl in day[r]) {
                            const val = day[r][sl]?.code || day[r][sl];
                            if(val === term) {
                                body.innerHTML = `<div class='bg-green-900 p-4 rounded'><b>MATCH FOUND</b><br>Date: ${ds}<br>Rack: ${r}<br>Slot: ${sl}</div>`;
                                found = true; break;
                            }
                        }
                        if(found) break;
                    }
                }
                if(found) break;
            }
            if(!found) body.innerHTML = "Not found in 30-day archive.";
        }

        async function restoreFromCSV() {
            const file = document.getElementById('restore-file').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const lines = e.target.result.split('\n');
                const d = document.getElementById('current-date').value;
                const r = document.getElementById('rack-select').value;
                for(let i=1; i<lines.length; i++) {
                    const cols = lines[i].split(',');
                    if(cols[1]) {
                        await db.ref(`samples/${d}/${r}/slot-${
